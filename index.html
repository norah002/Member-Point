<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>نظام النقاط الديناميكي- </title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f0f4fa;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1e3c5c;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        .subtitle {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        /* لوحة التحكم */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .panel-section {
            flex: 1 1 300px;
            background: #f8fbfe;
            padding: 20px;
            border-radius: 20px;
        }
        .panel-section h2 {
            color: #1e5f8e;
            margin-bottom: 15px;
            font-size: 1.4rem;
            border-right: 5px solid #3498db;
            padding-right: 10px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .input-group input, .input-group select {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #d4e0ec;
            border-radius: 50px;
            font-size: 1rem;
            min-width: 150px;
        }
        .input-group button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #1e8449;
            transition: 0.1s;
            white-space: nowrap;
        }
        .input-group button:hover {
            background: #229954;
        }
        .member-list, .task-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .member-tag {
            background: #3498db;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .member-tag button {
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
        }
        .task-tag {
            background: #e67e22;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .task-tag span {
            background: white;
            color: #e67e22;
            padding: 2px 10px;
            border-radius: 30px;
            margin-right: 5px;
            font-weight: 600;
        }
        .task-tag button {
            background: none;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* شبكة الأعضاء */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .member-card {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid #d9e2ef;
        }
        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3498db;
            padding-bottom: 15px;
            margin-bottom: 15px;
            cursor: pointer; /* يشير إلى قابلية الضغط */
        }
        .member-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e3c5c;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toggle-icon {
            font-size: 1.5rem;
            transition: transform 0.2s;
            display: inline-block;
        }
        .member-total {
            background: #2c3e50;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
        }

        .tasks-container {
            transition: max-height 0.3s ease, opacity 0.2s;
            overflow: hidden;
        }
        .tasks-container.collapsed {
            max-height: 0 !important;
            opacity: 0;
            margin: 0 !important;
            padding: 0 !important;
        }

        .task-category {
            background: #f3f7fd;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .category-title {
            font-weight: 700;
            color: #1e5f8e;
            margin-bottom: 12px;
            font-size: 1.1rem;
            border-right: 5px solid #3498db;
            padding-right: 10px;
        }
        .task-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 5px;
            border-bottom: 1px dashed #cbd6e4;
            flex-wrap: wrap;
        }
        .task-row input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #27ae60;
        }
        .task-desc {
            flex: 1;
            font-size: 0.95rem;
            color: #1e2f3e;
            word-break: break-word;
        }
        .task-points {
            background: #d4e3fd;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            color: #0b3b5c;
            white-space: nowrap;
        }
        .design-input {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
            margin-right: 30px;
            flex-wrap: wrap;
        }
        .design-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #bdd3e8;
            border-radius: 30px;
            min-width: 150px;
        }

        .summary-panel {
            background: white;
            border-radius: 30px;
            padding: 25px;
            margin-top: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .summary-header h2 {
            color: #1e3c5c;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #1f618d;
        }
        .btn-copy {
            background: #e67e22;
            border-bottom-color: #b45f1b;
        }
        .summary-content {
            background: #edf3fa;
            border-radius: 20px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            direction: ltr;
            text-align: left;
        }

        @media (max-width: 700px) {
            .control-panel { flex-direction: column; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧾 نظام النقاط الديناميكي</h1>
    <div class="subtitle">⚡ أضف أعضاء جدد · أضف مهام عامة · اضغط على اسم العضو لطي المهام</div>

    <!-- لوحة التحكم -->
    <div class="control-panel">
        <!-- قسم إدارة الأعضاء -->
        <div class="panel-section">
            <h2>👥 إدارة الأعضاء</h2>
            <div class="input-group">
                <input type="text" id="newMemberName" placeholder="اسم العضو الجديد...">
                <button id="addMemberBtn">➕ إضافة عضو</button>
            </div>
            <div class="member-list" id="memberList"></div>
        </div>

        <!-- قسم إدارة المهام العامة -->
        <div class="panel-section">
            <h2>📋 إدارة المهام العامة</h2>
            <div class="input-group">
                <input type="text" id="newTaskDesc" placeholder="وصف المهمة...">
                <input type="number" id="newTaskPoints" placeholder="النقاط" min="1" value="5" style="width: 100px;">
                <select id="newTaskCategory">
                    <option value="أفكار">💡 أفكار</option>
                    <option value="فرقة التصميم">🎨 تصميم</option>
                    <option value="تطوع">🤝 تطوع</option>
                    <option value="إنجازات سابقة">🏆 إنجاز</option>
                    <option value="أخرى">🔧 أخرى</option>
                </select>
                <button id="addTaskBtn">➕ إضافة مهمة</button>
            </div>
            <div class="task-list" id="taskList"></div>
        </div>
    </div>

    <!-- هنا يتم عرض الأعضاء مع مهامهم -->
    <div id="membersGrid" class="members-grid"></div>

    <!-- لوحة الملخص -->
    <div class="summary-panel">
        <div class="summary-header">
            <h2>📋 الملخص التفصيلي</h2>
            <div class="btn-group">
                <button class="btn" id="summaryBtn">📄 عرض الملخص</button>
                <button class="btn btn-copy" id="copySummaryBtn">📋 نسخ التقرير</button>
            </div>
        </div>
        <div class="summary-content" id="summaryText" dir="rtl">الملخص سيظهر هنا...</div>
    </div>
</div>

<script>
(function() {
    // -------------------- البيانات الأولية (الأعضاء والمهام الثابتة) --------------------
    let members = [
        "منتظر عبدالله عيسى البوعيسى",
        "علي حسن بن الشيخ",
        "حسين يوسف اللويم",
        "بشاير جواد عبدالعزيز النجار",
        "سراء محمد إسماعيل محمد",
        "شهد علي الجمعان",
        "حبيبه هاني عمر بدري",
        "منتظر حسين الجنبي",
        "عبدالمحسن علي الحاجي",
        "علي عبدالهادي العبدرب النبي"
    ];

    // المهام العامة (تبدأ بالمهام الأساسية)
    let generalTasks = [
        { desc: "🔍 تشييك أسبوعي (مرة واحدة) – 12 نقطة", points: 12, isDesign: false, category: "فرقة المتابعة" },
        { desc: "🔍 تشييك أسبوعي (مرتين) – 25 نقطة", points: 25, isDesign: false, category: "فرقة المتابعة" },
        { desc: "🖌️ عمل أسبوعي (تصميم/كود/واجهة) – 25 نقطة", points: 25, isDesign: true, category: "فرقة التصميم" },
        { desc: "🖼️ تصميم إضافي +5 (لكل تصميم)", points: 5, isDesign: true, category: "فرقة التصميم" },
        { desc: "🗂️ تنسيق وإدارة أسبوعي – 25 نقطة", points: 25, isDesign: false, category: "تنسيق وإدارة" },
        { desc: "💡 فكرة مفيدة – 5 نقاط", points: 5, isDesign: false, category: "أفكار" },
        { desc: "✨ فكرة مفيدة وتم تطبيقها – 10 نقاط", points: 10, isDesign: false, category: "أفكار" },
        { desc: "🤝 تطوع بتشييك (غير مسؤول) – +5 نقاط", points: 5, isDesign: false, category: "تطوع" },
        { desc: "🎨 تطوع بتصميم (غير مسؤول) – +10 نقاط", points: 10, isDesign: true, category: "تطوع" }
    ];

    // المهام الخاصة بكل عضو (إنجازات سابقة فردية)
    const specialTasksMap = {
        "علي حسن بن الشيخ": [
            { desc: "فكرة الإشعارات/الإعلان بالواتس", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "الكلمات المفتاحية بالتعليقات", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "كاهوت/لعبة يومية", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "الستريك (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "فوازير رمضان (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "فكرة ربط الستريك مع السبونسر", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "فاز بفعالية الردهة", points: 10, isDesign: false, category: "إنجازات سابقة" }
        ],
        "حبيبه هاني عمر بدري": [
            { desc: "فكرة إيموجي بأماكن مختلفة (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "فكرة صفحة الخدمات", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "تصميم البطاقة الي تُلبَس", points: 5, isDesign: true, category: "إنجازات سابقة" },
            { desc: "واجهة الختمة والفوازير", points: 10, isDesign: true, category: "إنجازات سابقة" },
            { desc: "تصميم صفحة الخدمات", points: 5, isDesign: true, category: "إنجازات سابقة" }
        ],
        "بشاير جواد عبدالعزيز النجار": [
            { desc: "فكرة مطبقة", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "تصميم البطاقة الي تُلبَس", points: 5, isDesign: true, category: "إنجازات سابقة" },
            { desc: "٤ تصاميم للفعاليات السابقة", points: 20, isDesign: true, category: "إنجازات سابقة" }
        ],
        "منتظر حسين الجنبي": [
            { desc: "الهيدر في المنصة (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "صورة البروفايل في الهيدر (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "صورة للصحيفة", points: 10, isDesign: true, category: "إنجازات سابقة" },
            { desc: "واجهة جلسة حوارية", points: 10, isDesign: true, category: "إنجازات سابقة" },
            { desc: "نقاط من المقابلة", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "عمل على الديسكورد", points: 20, isDesign: false, category: "إنجازات سابقة" }
        ],
        "حسين يوسف اللويم": [
            { desc: "صفحة التحميل", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "صورة للصحيفة", points: 10, isDesign: true, category: "إنجازات سابقة" },
            { desc: "واجهة ورشة التصميم", points: 10, isDesign: true, category: "إنجازات سابقة" },
            { desc: "نقاط من المقابلة", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "عمل على الديسكورد", points: 20, isDesign: false, category: "إنجازات سابقة" }
        ],
        "شهد علي الجمعان": [
            { desc: "صورة للصحيفة", points: 10, isDesign: true, category: "إنجازات سابقة" },
            { desc: "تصميم لليالي كفو (تطوع)", points: 10, isDesign: true, category: "إنجازات سابقة" },
            { desc: "فازت بمسابقة التصميم", points: 15, isDesign: false, category: "إنجازات سابقة" }
        ],
        "عبدالمحسن علي الحاجي": [
            { desc: "الوضع الداكن بالمنصة", points: 5, isDesign: false, category: "إنجازات سابقة" }
        ],
        "منتظر عبدالله عيسى البوعيسى": [
            { desc: "فكرة لتوزيع النقاط", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "تصميمين للفعاليات السابقة", points: 10, isDesign: true, category: "إنجازات سابقة" }
        ],
        "سراء محمد إسماعيل محمد": [
            { desc: "المقطع في الصفحة الرئيسية", points: 5, isDesign: false, category: "إنجازات سابقة" },
            { desc: "تصميم مختلف لصفحة الخدمات", points: 5, isDesign: true, category: "إنجازات سابقة" },
            { desc: "فكرة للثيم الرمضاني (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "فكرة مطبّقة لنظام النقاط", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "توزيع شي ثاني يخص النقاط (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "مجهودات إضافية تشكر", points: 10, isDesign: false, category: "إنجازات سابقة" },
            { desc: "مشاركة في فعالية التصميم", points: 5, isDesign: false, category: "إنجازات سابقة" }
        ]
    };

    // -------------------- المتغيرات العامة --------------------
    let memberSections = []; // لتخزين حالة checkboxes لكل عضو

    // عناصر واجهة الإضافة
    const memberListDiv = document.getElementById('memberList');
    const taskListDiv = document.getElementById('taskList');
    const membersGrid = document.getElementById('membersGrid');

    // -------------------- دوال تحديث واجهة الأعضاء والمهام المصغرة --------------------
    function renderMemberTags() {
        memberListDiv.innerHTML = '';
        members.forEach((member, index) => {
            const tag = document.createElement('span');
            tag.className = 'member-tag';
            tag.innerHTML = `${member} <button onclick="removeMember(${index})">✕</button>`;
            memberListDiv.appendChild(tag);
        });
    }

    function renderTaskTags() {
        taskListDiv.innerHTML = '';
        generalTasks.forEach((task, index) => {
            const tag = document.createElement('span');
            tag.className = 'task-tag';
            tag.innerHTML = `${task.desc} <span>${task.points}</span> <button onclick="removeTask(${index})">✕</button>`;
            taskListDiv.appendChild(tag);
        });
    }

    // دوال الحذف (ستُعرّف عامة)
    window.removeMember = function(index) {
        members.splice(index, 1);
        renderMemberTags();
        renderAllMembersCards();
    };

    window.removeTask = function(index) {
        generalTasks.splice(index, 1);
        renderTaskTags();
        renderAllMembersCards();
    };

    // إضافة عضو جديد
    document.getElementById('addMemberBtn').addEventListener('click', function() {
        const input = document.getElementById('newMemberName');
        const name = input.value.trim();
        if (name) {
            members.push(name);
            input.value = '';
            renderMemberTags();
            renderAllMembersCards();
        } else {
            alert('الرجاء إدخال اسم العضو');
        }
    });

    // إضافة مهمة عامة جديدة
    document.getElementById('addTaskBtn').addEventListener('click', function() {
        const descInput = document.getElementById('newTaskDesc');
        const pointsInput = document.getElementById('newTaskPoints');
        const categorySelect = document.getElementById('newTaskCategory');
        const desc = descInput.value.trim();
        const points = parseInt(pointsInput.value);
        const category = categorySelect.value;

        if (desc && points > 0) {
            const isDesign = (category === 'فرقة التصميم' || desc.includes('تصميم'));
            generalTasks.push({
                desc: desc,
                points: points,
                isDesign: isDesign,
                category: category
            });
            descInput.value = '';
            pointsInput.value = 5;
            renderTaskTags();
            renderAllMembersCards();
        } else {
            alert('الرجاء إدخال وصف المهمة ونقاط صحيحة');
        }
    });

    // -------------------- بناء بطاقات الأعضاء بشكل كامل --------------------
    function renderAllMembersCards() {
        membersGrid.innerHTML = '';
        memberSections = [];

        members.forEach((memberFullName, memberIdx) => {
            const specials = specialTasksMap[memberFullName] || [];
            const allTasks = [...specials, ...generalTasks];

            const card = document.createElement('div');
            card.className = 'member-card';
            card.dataset.memberIndex = memberIdx;

            // هيدر العامل (يحتوي على اسم العضو + السهم + المجموع)
            const header = document.createElement('div');
            header.className = 'member-header';
            header.setAttribute('data-member', memberIdx);

            const nameDiv = document.createElement('div');
            nameDiv.className = 'member-name';
            nameDiv.innerHTML = `<span class="toggle-icon">⬇️</span> ${memberFullName}`;

            const totalSpan = document.createElement('span');
            totalSpan.className = 'member-total';
            totalSpan.id = `total-${memberIdx}`;
            totalSpan.textContent = '0';

            header.appendChild(nameDiv);
            header.appendChild(totalSpan);
            card.appendChild(header);

            // حاوية المهام (التي سيتم طيها)
            const tasksContainer = document.createElement('div');
            tasksContainer.className = 'tasks-container';
            tasksContainer.id = `tasks-${memberIdx}`;

            // تجميع المهام حسب الفئة
            const categories = {};
            allTasks.forEach((task, idx) => {
                const cat = task.category || 'أخرى';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ ...task, globalIdx: idx });
            });

            let taskCounter = 0;
            const checkboxes = [];
            const designInputs = [];

            for (let cat in categories) {
                const catDiv = document.createElement('div');
                catDiv.className = 'task-category';
                catDiv.innerHTML = `<div class="category-title">${cat}</div>`;

                categories[cat].forEach(task => {
                    const taskRow = document.createElement('div');
                    taskRow.className = 'task-row';

                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.checked = false;
                    chk.dataset.member = memberIdx;
                    chk.dataset.task = taskCounter;
                    chk.dataset.points = task.points;

                    chk.addEventListener('change', function() {
                        updateAllTotals();
                    });

                    const descSpan = document.createElement('span');
                    descSpan.className = 'task-desc';
                    descSpan.textContent = task.desc;

                    const pointsSpan = document.createElement('span');
                    pointsSpan.className = 'task-points';
                    pointsSpan.textContent = `${task.points} نقطة`;

                    taskRow.appendChild(chk);
                    taskRow.appendChild(descSpan);
                    taskRow.appendChild(pointsSpan);
                    catDiv.appendChild(taskRow);

                    if (task.isDesign) {
                        const designDiv = document.createElement('div');
                        designDiv.className = 'design-input';
                        designDiv.innerHTML = `
                            <label>🏷️ اسم التصميم:</label>
                            <input type="text" placeholder="اختياري" data-member="${memberIdx}" data-task="${taskCounter}">
                        `;
                        catDiv.appendChild(designDiv);
                    }

                    checkboxes.push({ chk, taskIdx: taskCounter });
                    taskCounter++;
                });

                tasksContainer.appendChild(catDiv);
            }

            card.appendChild(tasksContainer);
            membersGrid.appendChild(card);

            // حفظ المراجع
            memberSections[memberIdx] = {
                checkboxes: checkboxes,
                designInputs: [], // سنعبئها بعد الإضافة
                memberName: memberFullName,
                tasksContainer: tasksContainer,
                toggleIcon: nameDiv.querySelector('.toggle-icon')
            };
        });

        // جمع حقول التصميم
        members.forEach((_, memberIdx) => {
            const designInputs = [];
            document.querySelectorAll(`.design-input input[data-member="${memberIdx}"]`).forEach(input => {
                const taskIdx = parseInt(input.dataset.task);
                designInputs.push({ input, taskIdx });
            });
            if (memberSections[memberIdx]) {
                memberSections[memberIdx].designInputs = designInputs;
            }
        });

        // إضافة فعالية النقر على الهيدر للطي
        document.querySelectorAll('.member-header').forEach(header => {
            header.addEventListener('click', function(e) {
                // منع الطي إذا تم النقر على زر المجموع نفسه (مجرد حماية)
                if (e.target.classList.contains('member-total')) return;
                const memberIdx = this.dataset.member;
                if (memberIdx !== undefined) {
                    toggleMemberTasks(parseInt(memberIdx));
                }
            });
        });

        updateAllTotals();
    }

    // دالة طي/إظهار المهام
    function toggleMemberTasks(memberIdx) {
        const section = memberSections[memberIdx];
        if (!section) return;
        const container = section.tasksContainer;
        const icon = section.toggleIcon;

        if (container.classList.contains('collapsed')) {
            container.classList.remove('collapsed');
            icon.textContent = '⬇️'; // سهم لأسفل (مفتوح)
        } else {
            container.classList.add('collapsed');
            icon.textContent = '⬅️'; // سهم لليسار (مغلق)
        }
    }

    // تحديث كل المجاميع
    function updateAllTotals() {
        memberSections.forEach((section, memberIdx) => {
            let total = 0;
            if (section && section.checkboxes) {
                section.checkboxes.forEach(item => {
                    if (item.chk.checked) {
                        total += parseInt(item.chk.dataset.points) || 0;
                    }
                });
            }
            const totalSpan = document.getElementById(`total-${memberIdx}`);
            if (totalSpan) totalSpan.textContent = total;
        });
    }

    // توليد الملخص
    function generateSummary() {
        let summary = '';
        let grandTotal = 0;

        memberSections.forEach((section, memberIdx) => {
            if (!section) return;
            const memberName = members[memberIdx] || 'عضو';
            let memberTotal = 0;
            let lines = [];

            section.checkboxes.forEach(item => {
                if (item.chk.checked) {
                    const taskIdx = item.taskIdx;
                    const points = parseInt(item.chk.dataset.points) || 0;
                    memberTotal += points;
                    const row = item.chk.closest('.task-row');
                    const descSpan = row?.querySelector('.task-desc');
                    const desc = descSpan ? descSpan.textContent : 'مهمة';
                    let designText = '';
                    const designObj = section.designInputs.find(d => d.taskIdx === taskIdx);
                    if (designObj && designObj.input.value.trim() !== '') {
                        designText = ` (التصميم: "${designObj.input.value}")`;
                    }
                    lines.push(`   ✅ ${desc} : ${points} نقطة${designText}`);
                }
            });

            if (lines.length > 0) {
                summary += `🔸 ${memberName}\n`;
                summary += lines.join('\n');
                summary += `\n   ➕ المجموع: ${memberTotal} نقطة\n\n`;
            } else {
                summary += `🔸 ${memberName}\n   ❌ لم يتم تحديد أي مهمة.\n\n`;
            }
            grandTotal += memberTotal;
        });

        summary += `🏁 الإجمالي العام: ${grandTotal} نقطة`;
        return summary;
    }

    function showSummary() {
        document.getElementById('summaryText').textContent = generateSummary();
    }

    function copySummary() {
        const summary = generateSummary();
        const detailed = `📊 تقرير النقاط الديناميكي:\n\n${summary}\n\n🗓️  ${new Date().toLocaleString('ar-EG')}`;
        navigator.clipboard.writeText(detailed).then(() => alert('✅ تم النسخ')).catch(() => alert('⚠️ فشل النسخ'));
    }

    // أحداث الأزرار
    document.getElementById('summaryBtn').addEventListener('click', showSummary);
    document.getElementById('copySummaryBtn').addEventListener('click', copySummary);

    // التهيئة الأولية
    renderMemberTags();
    renderTaskTags();
    renderAllMembersCards();
})();
</script>
</body>
</html>
